<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Webpage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            background-color: #0078d7;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease; /* Smooth transition for default hover */
        }

        button:hover {
            background-color: #005ea6;
        }

        /* NEW CSS FOR RAINBOW BUTTON */
        .rainbow-button {
            /* Define a background gradient with multiple colors */
            background-image: linear-gradient(to right,
                #FF0000, /* Red */
                #FF7F00, /* Orange */
                #FFFF00, /* Yellow */
                #00FF00, /* Green */
                #0000FF, /* Blue */
                #4B0082, /* Indigo */
                #9400D3  /* Violet */
            );
            /* Make the background much wider than the button to allow movement */
            background-size: 400% 100%;
            /* Animation: name, duration, timing, iteration-count */
            animation: rainbowAnimation 8s linear infinite; /* Adjust duration as needed */
            color: white; /* Ensure text is visible over rainbow */
            border: none; /* Override any default button border */
            /* Ensure the gradient takes precedence over background-color */
            background-color: transparent !important;
            /* No hover effect for the rainbow button, or define a new one */
            transition: none; /* Disable default transition for this state */
        }

        /* Define the animation for the rainbow effect */
        @keyframes rainbowAnimation {
            0% { background-position: 0% 0%; } /* Start position of the gradient */
            100% { background-position: -300% 0%; } /* End position (moves the gradient across) */
            /* Explanation: background-size is 400% of button width.
               To move the entire 400% gradient across, you need to shift it by 300% (400% - 100%)
               of the button's width relative to its container. */
        }

        /* Optional: Keep text visible against a dynamic background */
        .rainbow-button span {
            position: relative;
            z-index: 1; /* Ensures text stays above the animated background */
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>This is a simple HTML webpage example.</p>

        <!-- Pass 'this' (the button element itself) to the function -->
        <button onclick="showMessage(this)">
            <span>Click Me</span>
        </button>

        <p id="message"></p>
    </div>

    <script>
        // The function now accepts the button element as an argument
        function showMessage(buttonElement) {
            document.getElementById("message").innerHTML =
                "Hello! JavaScript is working.";

            // Add the 'rainbow-button' class to the clicked button
            buttonElement.classList.add('rainbow-button');

            // Optional: You might want to prevent the message from appearing
            // every time if you intend for the button to only change color once.
            // For now, it will keep displaying the message.
        }
    </script>

</body>
</html>
