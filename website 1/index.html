<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #editor-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="editor-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });

        let editor;

        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: '// Type your C# or JS code here...',
                language: 'javascript',
                theme: 'vs',
                automaticLayout: true
            });
        });

        // Functions called by C# WinForms
        function changeLanguage(lang) {
            if (editor) {
                monaco.editor.setModelLanguage(editor.getModel(), lang);
            }
        }

        function getEditorContent() {
            if (editor) {
                // Sends the code back to WinForms via WebView2 script message
                window.chrome.webview.postMessage(editor.getValue());
            }
        }
    </script>
</body>
</html>
