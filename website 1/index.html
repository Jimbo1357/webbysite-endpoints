<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Editor - AutoComplete & Languages</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #toolbar {
            height: 40px;
            background-color: #f3f3f3;
            border-bottom: 1px solid #e2e2e2;
            display: flex;
            align-items: center;
            padding: 0 15px;
        }
        #language-select {
            margin-left: 10px;
            padding: 4px 8px;
            font-size: 14px;
        }
        #editor-container { 
            width: 100vw; 
            height: calc(100vh - 41px); 
        }
    </style>
</head>
<body>
    
    <div id="toolbar">
        <label for="language-select"><strong>Language:</strong></label>
        <select id="language-select">
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="json">JSON</option>
            <option value="java">Java</option>
            <option value="cpp">C++</option>
            <option value="sql">SQL</option>
        </select>
    </div>

    <div id="editor-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    
    <script>
        require.config({ 
            paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } 
        });

        // 1. THE WORKER PROXY FIX
        // This allows Monaco's built-in HTML/CSS/JSON IntelliSense to work over a CDN
        window.MonacoEnvironment = {
            getWorkerUrl: function(workerId, label) {
                const proxyScript = `
                    self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/' };
                    importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/base/worker/workerMain.js');
                `;
                return URL.createObjectURL(new Blob([proxyScript], { type: 'text/javascript' }));
            }
        };

        require(['vs/editor/editor.main'], function () {

            // 2. CUSTOM AUTO-COMPLETE FOR PYTHON
            // This injects snippets and keywords when the user types in Python mode
            monaco.languages.registerCompletionItemProvider('python', {
                provideCompletionItems: function(model, position) {
                    
                    // Find out what word the user is currently typing to replace it properly
                    const word = model.getWordUntilPosition(position);
                    const range = {
                        startLineNumber: position.lineNumber,
                        endLineNumber: position.lineNumber,
                        startColumn: word.startColumn,
                        endColumn: word.endColumn
                    };

                    return {
                        suggestions: [
                            {
                                label: 'print',
                                kind: monaco.languages.CompletionItemKind.Function,
                                insertText: 'print(${1:text})',
                                insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                                documentation: 'Prints data to the standard output device.',
                                range: range
                            },
                            {
                                label: 'def',
                                kind: monaco.languages.CompletionItemKind.Keyword,
                                insertText: 'def ${1:function_name}(${2:args}):\n\t${3:pass}',
                                insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                                documentation: 'Define a new Python function.',
                                range: range
                            },
                            {
                                label: 'import',
                                kind: monaco.languages.CompletionItemKind.Keyword,
                                insertText: 'import ',
                                documentation: 'Import a module into the current namespace.',
                                range: range
                            }
                        ]
                    };
                }
            });

            // 3. INITIALIZE THE EDITOR
            const editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: [
                    '// Switch to Python to see custom auto-complete (type "def" or "print")',
                    '// Switch to HTML/CSS to see native auto-complete',
                    'function greet() {',
                    '\tconsole.log("Hello, World!");',
                    '}',
                    '',
                    'greet();'
                ].join('\n'),
                language: 'javascript',
                theme: 'vs',
                automaticLayout: true
            });

            // 4. LANGUAGE SWITCHER LOGIC
            document.getElementById('language-select').addEventListener('change', (event) => {
                monaco.editor.setModelLanguage(editor.getModel(), event.target.value);
            });
        });
    </script>
</body>
</html>
